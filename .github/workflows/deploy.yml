# TL-DEPLOY-001 (AWS · ECS Express Mode): push to main -> build image ->
# push to ECR -> run the DB migration as a ONE-SHOT ECS task -> roll the
# service -> verify health.
#
# Why the migration is a CI step and not the container entrypoint: ECS
# Express Mode forces canary deployments and its deployment strategy cannot
# be changed (official docs, accessed 2026-07-16), so old and new service
# tasks coexist during a rollout — boot-time migrations would race. The
# service's task definition sets SKIP_MIGRATIONS=1; this workflow runs
# `docker-entrypoint.sh migrate` once, against the freshly pushed image,
# before triggering the deployment.
#
# ONE-SHOT TASK PRECONDITION: the migrate step below only works because the
# image was rebuilt and pushed IN THIS RUN, so it contains the current
# entrypoint. Never trigger one-shot ECS tasks after a [skip ci] commit —
# a stale image ignores the command override and fakes success (2026-07-17
# incident). If you must skip CI, rebuild and push the image before any
# run-task.
#
# Required GitHub configuration (user sets these, never in code):
#   secret   AWS_DEPLOY_ROLE_ARN  IAM role via GitHub OIDC (provision step 2,
#                                 now including ecs:RunTask/UpdateService +
#                                 iam:PassRole — see infra/aws-provision.sh)
#   variable AWS_REGION           us-east-2 (us-east-1 on full fallback)
#   variable AWS_ACCOUNT_ID       12-digit account id
#   variable AWS_SUBNETS          comma-separated default-VPC public subnets
#   variable AWS_APP_SG           tradelens-app security group id
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Newest push wins: a fresh deploy cancels an in-flight one (single-operator
# pipeline; the migrate step is idempotent, so cancellation is safe).
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # GitHub OIDC -> AWS role, no long-lived keys
      contents: read
    env:
      ECR_REPO: tradelens
      CLUSTER: default
      SERVICE: tradelens
      TASK_DEF: tradelens
      # Repo variables override; the literals are the provisioned us-east-2
      # values (subnet/SG ids are not secrets — they are already in infra/).
      # Set AWS_SUBNETS / AWS_APP_SG repo variables to change without a commit.
      SUBNETS: ${{ vars.AWS_SUBNETS || 'subnet-08b41021d844fbba4,subnet-0ab978a52584cf4d4' }}
      APP_SG: ${{ vars.AWS_APP_SG || 'sg-09131eb0aaa971a47' }}
      # Express Mode default URL until the custom domain is bound; set the
      # HEALTH_URL repo variable to https://mytradelens.app afterwards.
      HEALTH_URL: ${{ vars.HEALTH_URL || 'https://tr-debccbde876f46f0b4cbe892002bcd93.ecs.us-east-2.on.aws' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Run database migration (one-shot ECS task)
        run: |
          SUBNET_LIST=$(echo "$SUBNETS" | sed 's/,/","/g')
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" --launch-type FARGATE \
            --task-definition "$TASK_DEF" \
            --network-configuration "{\"awsvpcConfiguration\":{\"subnets\":[\"$SUBNET_LIST\"],\"securityGroups\":[\"$APP_SG\"],\"assignPublicIp\":\"ENABLED\"}}" \
            --overrides '{"containerOverrides":[{"name":"Main","command":["migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || { echo "migration failed"; exit 1; }

      - name: Roll the service to the new image
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --force-new-deployment >/dev/null
          echo "deployment triggered (canary; :latest re-resolves to the new digest)"

      - name: Health check
        run: |
          echo "waiting for the canary rollout"
          sleep 60
          for i in $(seq 1 30); do
            # --max-time: a stalling endpoint must never hang the pipeline
            # (a missing timeout wedged this step for an hour on 2026-07-17
            # when the then-unbound custom domain resolved to a parking page).
            code=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' "$HEALTH_URL/api/health" || true)
            if [ "$code" = "200" ]; then echo "healthy"; exit 0; fi
            echo "waiting ($code)"; sleep 10
          done
          echo "health check failed"; exit 1
