# TL-DEPLOY-001 (AWS): push to main -> build image -> push to Amazon ECR.
# The App Runner service is created with auto-deployments ENABLED on the
# :latest tag, so an ECR push IS the deployment trigger (chosen over an
# explicit `aws apprunner start-deployment` — one moving part fewer; the
# health-check step below still verifies the rollout landed).
# Database migrations run inside the container entrypoint on boot
# (single-instance autoscaling, max size 1 — see docker-entrypoint.sh).
#
# Required GitHub configuration (user sets these, never in code):
#   secret  AWS_DEPLOY_ROLE_ARN   IAM role assumed via GitHub OIDC
#                                 (infra/aws-provision.sh step 2)
#   variable AWS_REGION           us-east-2 (or us-east-1 on full fallback)
#   variable AWS_ACCOUNT_ID       12-digit account id
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # GitHub OIDC -> AWS role, no long-lived keys
      contents: read
    env:
      ECR_REPO: tradelens
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Health check (App Runner auto-deploys on the :latest push)
        run: |
          echo "waiting for App Runner to roll out the new image"
          sleep 60
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://mytradelens.app/api/health || true)
            if [ "$code" = "200" ]; then echo "healthy"; exit 0; fi
            echo "waiting ($code)"; sleep 10
          done
          echo "health check failed"; exit 1
